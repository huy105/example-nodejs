name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write   # needed to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t scan-target:${{ github.sha }} .

      - name: Run Trivy vulnerability scan (console log)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Run Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        if: always()              # upload even if scan found issues
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
