name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: giahuy105/example-nodejs

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest=${{ env.IMAGE }}:latest" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag }} \
            -t ${{ steps.meta.outputs.latest }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.latest }}

      - name: Trigger deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                image_tag: '${{ steps.meta.outputs.short_sha }}'
              }
            })
